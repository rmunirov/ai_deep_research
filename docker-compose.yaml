services:
  postgres:
    image: postgres:17-alpine
    container_name: deep_research_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: deep_research
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deep_research"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
